name: Stumpwatch
options:
  bundleIdPrefix: com.shimondeitel.stumpwatch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Stumpwatch:
    type: application
    platform: iOS
    sources:
      - path: Stumpwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stumpwatch
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Stumpwatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  StumpwatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StumpwatchTests
      - path: Stumpwatch.storekit
    dependencies:
      - target: Stumpwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stumpwatch.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  StumpwatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StumpwatchUITests
    dependencies:
      - target: Stumpwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stumpwatch.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Stumpwatch:
    build:
      targets:
        Stumpwatch: all
        StumpwatchTests: [test]
        StumpwatchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Stumpwatch.storekit
    test:
      config: Debug
      storeKitConfiguration: Stumpwatch.storekit
      targets:
        - StumpwatchTests
        - StumpwatchUITests
    archive:
      config: Release
